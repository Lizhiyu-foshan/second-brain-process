name: second-brain-v2.1-global
version: 2.1.0
description: Second Brain Processor v2.1 全局约束

rules:
  - id: R001
    level: critical
    category: architecture
    name: 目录结构必须遵循v2.1设计
    description: |
      必须严格遵循v2.1设计的目录结构：
      - 00-Inbox/ - 原始对话记录
      - 01-Discussions/ - 主题讨论精华
      - 02-Conversations/ - 对话记录
      - 03-Articles/ - 文章剪藏(含WeChat/Zhihu/Substack子目录)
    patterns:
      - type: regex
        pattern: "(00-Inbox|01-Discussions|02-Conversations|03-Articles)"
        file_pattern: "*.py"
    remediation: |
      所有文件路径引用必须使用v2.1标准目录结构

  - id: R002
    level: critical
    category: functionality
    name: 日期编号+7天滚动删除必须实现
    description: |
      collect_raw_conversations.py必须实现：
      1. 按YYYY-MM-DD_raw.md格式保存
      2. 自动清理7天前的文件
    patterns:
      - type: regex
        pattern: "cleanup_old_raw_files|datetime.*timedelta.*days.*7"
        file_pattern: "collect_raw_conversations.py"
    remediation: |
      实现cleanup_old_raw_files函数，保留7天滚动删除

  - id: R003
    level: critical
    category: functionality
    name: Dashboard自动更新必须实现
    description: |
      step4_push_to_github.py必须在推送前调用update_dashboard()
    patterns:
      - type: regex
        pattern: "update_dashboard|Dashboard.*更新"
        file_pattern: "step4_push_to_github.py"
    remediation: |
      在git push前调用update_dashboard()更新统计

  - id: R004
    level: high
    category: functionality
    name: 入口D立即响应(无等待)
    description: |
      用户回复"没有时间"后必须立即提示AI自动整理选项，不再等待10分钟
    patterns:
      - type: regex
        pattern: "handle_no_time_response|AI自动整理|不再等待"
        file_pattern: "scheduled_discussion_handler.py"
    remediation: |
      实现handle_no_time_response函数，立即响应无等待

  - id: R005
    level: high
    category: code_quality
    name: 增量索引系统必须集成
    description: |
      lib/message_index.py必须正确集成，所有定时任务使用增量处理
    patterns:
      - type: file_exists
        path: "lib/message_index.py"
      - type: regex
        pattern: "from lib.message_index import|IndexManager"
        file_pattern: "*.py"
    remediation: |
      复制已验证的message_index.py到lib/目录

  - id: R006
    level: high
    category: functionality
    name: 四步法完整实现
    description: |
      必须完整实现四步法的4个步骤和主控脚本
    patterns:
      - type: file_exists
        path: "step1_identify_essence.py"
      - type: file_exists
        path: "step2_generate_essence.py"
      - type: file_exists
        path: "step3_organize_remainder.py"
      - type: file_exists
        path: "step4_push_to_github.py"
      - type: file_exists
        path: "run_four_step_process.py"
    remediation: |
      创建所有四步法相关文件

  - id: R007
    level: high
    category: functionality
    name: 四个入口完整实现
    description: |
      必须实现入口A/B/C/D的完整流程
    patterns:
      - type: regex
        pattern: "daily_conversation_organize|article_discussion|article_auto_process_immediate"
        file_pattern: "queue_response_handler.py"
    remediation: |
      扩展queue_response_handler支持四个入口

  - id: R008
    level: medium
    category: code_quality
    name: 代码必须通过语法检查
    description: |
      所有Python文件必须通过python3 -m py_compile
    check_command: "python3 -m py_compile {{file}}"
    remediation: |
      修复语法错误后再提交

  - id: R009
    level: medium
    category: documentation
    name: 必须成为标准Skill
    description: |
      必须包含SKILL.md和second-brain入口脚本
    patterns:
      - type: file_exists
        path: "SKILL.md"
      - type: file_exists
        path: "second-brain"
    remediation: |
      创建标准Skill文件

  - id: R010
    level: medium
    category: testing
    name: 必须通过功能测试
    description: |
      核心功能必须测试验证后才能推送
    remediation: |
      创建并运行测试用例
