name: second-brain-v2.1
description: Second Brain Processor v2.1 - 知识整理系统完整开发
version: 2.1.0

constraints:
  - 必须严格遵循v2.1设计文档
  - 集成已验证的增量索引系统
  - 10个文件必须完整实现
  - 必须成为标准OpenClaw Skill
  - 代码必须通过AST审计（≥85分）
  - 必须测试验证后推送GitHub

phases:
  - name: design
    description: 设计验证与约束定义
    deliverables:
      - 约束模板
      - 架构设计确认
  
  - name: development  
    description: 核心文件开发
    deliverables:
      - collect_raw_conversations.py
      - daily_complete_report.py
      - step1_identify_essence.py
      - step2_generate_essence.py
      - step3_organize_remainder.py
      - step4_push_to_github.py
      - run_four_step_process.py
      - article_handler.py
      - queue_response_handler.py
      - scheduled_discussion_handler.py
      - lib/message_index.py (集成)
  
  - name: integration
    description: 系统集成与Skill化
    deliverables:
      - SKILL.md
      - second-brain 入口脚本
      - 目录结构调整
  
  - name: testing
    description: 测试验证
    deliverables:
      - 单元测试
      - 集成测试
      - AST审计报告
  
  - name: deployment
    description: GitHub推送
    deliverables:
      - 代码推送到Second-Brain-Process仓库

timeline:
  start: 2026-03-21
  target: 2026-03-21

complexity: high
